name: Bridge Check

on:
  push:
    paths:
      - ".github/workflows/bridge-check.yml"
      - "androdex-bridge/**"
  pull_request:
    paths:
      - ".github/workflows/bridge-check.yml"
      - "androdex-bridge/**"

jobs:
  bridge-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: androdex-bridge/package-lock.json

      - name: Install bridge dependencies
        working-directory: androdex-bridge
        run: npm ci

      - name: Run bridge tests
        working-directory: androdex-bridge
        run: npm test

      - name: Verify bridge entrypoints load
        working-directory: androdex-bridge
        run: |
          node -e "const mod = require('./src'); const names = ['startBridge', 'openLastActiveThread', 'watchThreadRollout']; for (const name of names) { if (typeof mod[name] !== 'function') { throw new Error('Missing export: ' + name); } }"
