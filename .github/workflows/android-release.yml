name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

jobs:
  android-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Android signing secrets
        env:
          ANDRODEX_ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDRODEX_ANDROID_KEYSTORE_BASE64 }}
          ANDRODEX_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDRODEX_ANDROID_KEYSTORE_PASSWORD }}
          ANDRODEX_ANDROID_KEY_ALIAS: ${{ secrets.ANDRODEX_ANDROID_KEY_ALIAS }}
          ANDRODEX_ANDROID_KEY_PASSWORD: ${{ secrets.ANDRODEX_ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for name in \
            ANDRODEX_ANDROID_KEYSTORE_BASE64 \
            ANDRODEX_ANDROID_KEYSTORE_PASSWORD \
            ANDRODEX_ANDROID_KEY_ALIAS \
            ANDRODEX_ANDROID_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "Missing secret: ${name}" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Decode Android release keystore
        env:
          ANDRODEX_ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDRODEX_ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDRODEX_ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release-keystore.jks

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build signed release APK
        working-directory: android
        env:
          ANDRODEX_ANDROID_KEYSTORE_PATH: release-keystore.jks
          ANDRODEX_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDRODEX_ANDROID_KEYSTORE_PASSWORD }}
          ANDRODEX_ANDROID_KEY_ALIAS: ${{ secrets.ANDRODEX_ANDROID_KEY_ALIAS }}
          ANDRODEX_ANDROID_KEY_PASSWORD: ${{ secrets.ANDRODEX_ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: androdex-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
