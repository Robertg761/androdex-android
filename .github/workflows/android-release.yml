name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

jobs:
  android-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode Android release keystore
        env:
          ANDRODEX_ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDRODEX_ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDRODEX_ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing secret: ANDRODEX_ANDROID_KEYSTORE_BASE64" >&2
            exit 1
          fi
          echo "$ANDRODEX_ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release-keystore.jks

      - name: Write Android signing properties
        run: |
          cat <<EOF > android/keystore.properties
          storeFile=release-keystore.jks
          storePassword=${{ secrets.ANDRODEX_ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDRODEX_ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDRODEX_ANDROID_KEY_PASSWORD }}
          EOF

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: androdex-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
